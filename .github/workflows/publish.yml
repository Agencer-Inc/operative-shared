name: Publish to npmjs

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@agencer"
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r build
      - name: Publish all packages
        run: |
          PUBLISHED=0
          for pkg in voice-infrastructure total-recall ui-primitives deferred-tools-registry usage-accountant; do
            echo "--- publishing @agencer/$pkg ---"
            (cd packages/$pkg && npm publish --access public --tag alpha) && PUBLISHED=$((PUBLISHED + 1)) || echo "  (skipped — likely already published at this version)"
          done
          echo "---"
          echo "Successfully published: $PUBLISHED package(s)"
          if [ "$PUBLISHED" -eq 0 ]; then
            echo "ERROR: nothing was published. Failing the run."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
